<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Attendance - MAI</title>
  <link rel="icon" href="https://drive.google.com/uc?export=view&id=1xWEiPu4lpF4KcVJcRPjGLjAcAIRW78_W"> <!-- Company logo as favicon -->
  <meta name="theme-color" content="#4CAF50"> <!-- For PWA -->
  <link rel="manifest" href="manifest.json"> <!-- For PWA -->
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding: 20px; }
    .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    img { max-width: 150px; margin-bottom: 20px; } /* Company logo */
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
    button { background: #4CAF50; color: white; padding: 10px; border: none; width: 100%; border-radius: 5px; cursor: pointer; }
    button:hover { background: #45a049; }
    #message { margin-top: 20px; color: red; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://drive.google.com/uc?export=view&id=1xWEiPu4lpF4KcVJcRPjGLjAcAIRW78_W" alt="MAI - Manpower Alliance of India Logo">
    <h1>Daily Attendance</h1>
    <p>Enter your details and OTP from your senior.</p>
    <form id="attendanceForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="text" id="id" placeholder="Allocated ID Number" required>
      <input type="email" id="seniorEmail" placeholder="Assigned Senior's Email" required>
      <input type="text" id="otp" placeholder="OTP from Senior" required>
      <button type="submit">Submit Attendance</button>
    </form>
    <div id="message"></div>
  </div>
  <script>
    document.getElementById('attendanceForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var messageDiv = document.getElementById('message');
      messageDiv.textContent = 'Submitting...';

      // Get location
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          var lat = position.coords.latitude;
          var lng = position.coords.longitude;
          submitData(lat, lng);
        }, function(error) {
          console.log('Location error:', error);
          submitData(null, null); // Proceed without location
        });
      } else {
        submitData(null, null);
      }

      function submitData(lat, lng) {
        var data = {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          id: document.getElementById('id').value,
          seniorEmail: document.getElementById('seniorEmail').value,
          otp: document.getElementById('otp').value,
          lat: lat,
          lng: lng
        };

        fetch('https://script.google.com/macros/s/AKfycbwSL3Ig5j8QreTAH1nYunUz6vK7-PA4z9VQFDIYoDDiBCEHMK1-1oLJQzviBBGHIMdyWQ/exec', { // Replace with your web app URL
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
          if (result.status === 'success') {
            messageDiv.style.color = 'green';
            messageDiv.textContent = result.message;
            document.getElementById('attendanceForm').reset(); // Clear form
          } else {
            messageDiv.textContent = 'Error: ' + result.message;
          }
        })
        .catch(error => {
          messageDiv.textContent = 'Submission failed. Check console for details.';
          console.error('Error:', error);
        });
      }
    });
  </script>
</body>
</html>
